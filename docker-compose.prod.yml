services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_media:/var/www/media:ro
      - backend_static:/var/www/static:ro
    restart: unless-stopped

  backend:
    build:
      context: ./backend/backend
    env_file:
      - ./backend/backend/backend/backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: "123"
      ADMIN_EMAIL: admin@sdc.local
      ADMIN_ROLE: OFFICER
      SEED_MASTER_DATA: "true"
      SEED_DEMO_USERS: "false"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - backend_media:/app/backend/media
      - backend_static:/app/backend/staticfiles
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/frontend
    environment:
      NODE_ENV: production
      PORT: "4000"
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    expose:
      - "4000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sdc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  backend_media:
  backend_static:
