<div class="admin-page">
  <div class="page-header">
    <h1>All Tickets</h1>
    <p>System-wide ticket list.</p>
  </div>

  <div *ngIf="isLoading" class="loading-state">Loading tickets...</div>
  <div *ngIf="errorMessage" class="error-state">{{ errorMessage }}</div>

  <div *ngIf="!isLoading" class="card">
    <table class="data-table" *ngIf="tickets.length > 0; else emptyState">
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Status</th>
          <th>Priority</th>
          <th>Created By</th>
          <th>Created At</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let ticket of tickets">
          <td>{{ ticket.id }}</td>
          <td>{{ ticket.title }}</td>
          <td>{{ ticket.status }}</td>
          <td>{{ ticket.priority || '-' }}</td>
          <td>{{ ticket.created_by_name }}</td>
          <td>{{ ticket.created_at | date: 'short' }}</td>
        </tr>
      </tbody>
    </table>

    <ng-template #emptyState>
      <div class="empty-state">No tickets found.</div>
    </ng-template>
  </div>
</div>
